<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pastel Snake Game</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #FFF7F0;
    font-family: "Segoe UI", sans-serif;
}

h1 {
    color: #8B8BAE;
    margin-bottom: 10px;
}

.score {
    font-size: 20px;
    color: #7D7D9C;
    margin-bottom: 10px;
}

canvas {
    background: #FDFDFD;
    border: 6px solid #D8C4F1;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.info {
    margin-top: 12px;
    color: #8B8BAE;
}
</style>
</head>
<body>

<h1>🐍 Pastel Snake</h1>
<div class="score">คะแนน: <span id="score">0</span></div>

<canvas id="game" width="400" height="400"></canvas>

<div class="info">
ใช้ปุ่ม ⬆ ⬇ ⬅ ➡ เพื่อบังคับงู
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 20;
const rows = canvas.width / box;

let snake = [
    {x: 10 * box, y: 10 * box}
];

let direction = "RIGHT";

let food = randomFood();

let score = 0;

document.addEventListener("keydown", changeDirection);

function changeDirection(e){
    if(e.key === "ArrowUp" && direction !== "DOWN")
        direction = "UP";
    else if(e.key === "ArrowDown" && direction !== "UP")
        direction = "DOWN";
    else if(e.key === "ArrowLeft" && direction !== "RIGHT")
        direction = "LEFT";
    else if(e.key === "ArrowRight" && direction !== "LEFT")
        direction = "RIGHT";
}

function randomFood(){
    return {
        x: Math.floor(Math.random() * rows) * box,
        y: Math.floor(Math.random() * rows) * box
    };
}

function collision(head, body){
    for(let part of body){
        if(head.x === part.x && head.y === part.y){
            return true;
        }
    }
    return false;
}

function draw(){

    ctx.fillStyle = "#FFFDF8";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // อาหาร
    ctx.fillStyle = "#FFB6C1";
    ctx.beginPath();
    ctx.arc(food.x + box/2, food.y + box/2, 8, 0, Math.PI*2);
    ctx.fill();

    // งู
    snake.forEach((segment,index)=>{
        ctx.fillStyle = index === 0 ? "#A8D8EA" : "#C7F0DB";

        ctx.beginPath();
        ctx.roundRect(segment.x, segment.y, box, box, 8);
        ctx.fill();
    });

    let headX = snake[0].x;
    let headY = snake[0].y;

    if(direction === "UP") headY -= box;
    if(direction === "DOWN") headY += box;
    if(direction === "LEFT") headX -= box;
    if(direction === "RIGHT") headX += box;

    // กินอาหาร
    if(headX === food.x && headY === food.y){
        score++;
        document.getElementById("score").textContent = score;
        food = randomFood();
    } else {
        snake.pop();
    }

    const newHead = {x: headX, y: headY};

    // ชนกำแพงหรือชนตัวเอง
    if(
        headX < 0 ||
        headY < 0 ||
        headX >= canvas.width ||
        headY >= canvas.height ||
        collision(newHead, snake)
    ){
        clearInterval(game);
        setTimeout(()=>{
            alert("เกมจบ! คะแนน: " + score);
            location.reload();
        },100);
        return;
    }

    snake.unshift(newHead);
}

const game = setInterval(draw, 120);
</script>

</body>
</html>
